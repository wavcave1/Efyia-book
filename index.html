<!doctype html>
<html lang="en" data-theme="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="description" content="Efyia Book is the studio booking marketplace for artists, engineers, and producers. Discover, compare, and book recording studios across major music markets." />
    <meta property="og:title" content="Efyia Book — Studio Booking Marketplace" />
    <meta property="og:description" content="Find and book recording studios for recording, mixing, mastering, and podcast sessions." />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/png" href="/images/favicon.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
    <title>Efyia Book — Studio Booking Marketplace</title>
  </head>
  <body>
    <script>
      (function () {
        var stored = localStorage.getItem('efyia-theme');
        var theme = stored === 'light' || stored === 'dark'
          ? stored
          : (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        document.documentElement.setAttribute('data-theme', theme);
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
